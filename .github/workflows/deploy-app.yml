name: "Build and Deploy to GKE"

on:
  # workflow_dispatch
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'k8s/**'
      - '.github/workflows/**'
    paths-ignore:
      - 'README.md'
  pull_request:
    branches:
      - main
    paths:
      - 'app/**'
      - 'k8s/**'
      - '.github/workflows/**'
    paths-ignore:
      - 'README.md'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: australia-southeast1
  CLUSTER_NAME: wiz-autopilot-cluster
  AR_REPO: wiz-gar-repo
  IMAGE_NAME: flask-app
  SA_NAME: gke-deployer
  MONGO_APP_PASS: ${{ secrets.MONGO_APP_PASS }}

jobs:
  build-and-deploy:
    name: "Build & Deploy"
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
          service_account: '${{ env.SA_NAME }}@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      # ── Supply Chain: Scan source deps + K8s misconfigs ──
      - name: Scan Source & K8s Manifests (Trivy FS)
        uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'vuln,license,misconfig'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'
          version: 'v0.69.2'

      - name: Build Docker Image
        run: |
          docker build --no-cache -t ${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${IMAGE_NAME}:${GITHUB_SHA} \
                       -t ${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${IMAGE_NAME}:latest \
                       ./app

      - name: Scan Image with Trivy
        uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478
        env:
          TRIVY_LICENSE_FORBIDDEN: 'AGPL-3.0,GPL-3.0'
          TRIVY_LICENSE_RESTRICTED: 'GPL-2.0,LGPL-2.1'  
        with:
          image-ref: '${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}'
          scanners: 'vuln,license'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'
          version: 'v0.69.2'

            # ── Supply Chain: Generate SBOM ──
      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478
        with:
          image-ref: '${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}'
          format: 'cyclonedx'
          output: 'sbom.cdx.json'
          version: 'v0.69.2'

      - name: Upload SBOM as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.cdx.json
          retention-days: 90

      - name: Push Docker Image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          docker push ${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${IMAGE_NAME}:${GITHUB_SHA}
          # docker push ${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${IMAGE_NAME}:latest

      - name: Get Image Digest
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: digest
        run: |
          IMAGE_TAG="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${IMAGE_NAME}:${GITHUB_SHA}"
          FULL_REF=$(docker image inspect "${IMAGE_TAG}" --format json | jq -r '.[0].RepoDigests[0]')
          echo "image=${FULL_REF}" >> $GITHUB_OUTPUT
          echo "Deploying image: ${FULL_REF}"

          # Without Cosign
          # DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' \
          #   ${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${IMAGE_NAME}:${GITHUB_SHA})
          # echo "image=${DIGEST}" >> $GITHUB_OUTPUT
          # echo "Deploying image: ${DIGEST}"

      # ── Supply Chain Security: Cosign Image Signing ──
      - name: Install Cosign
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: sigstore/cosign-installer@v3

      - name: Sign Image (Keyless)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "Signing: ${{ steps.digest.outputs.image }}"
          cosign sign --yes "${{ steps.digest.outputs.image }}"

      - name: Verify Image Signature
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          cosign verify \
            --certificate-identity-regexp="https://github.com/jasaz/deploy-webapp/.*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            "${{ steps.digest.outputs.image }}"

      - name: Get GKE Credentials
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.REGION }}

      - name: Deploy to GKE
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          # Update image in deployment manifest using immutable digest
          sed -i "s|IMAGE_PLACEHOLDER|${{ steps.digest.outputs.image }}|g" k8s/deployment.yaml

          # Update MONGO_URI in secret manifest with credentials
          ENCODED_PASS=$(python3 -c "import urllib.parse; print(urllib.parse.quote_plus('${MONGO_APP_PASS}'))")
          sed -i "s|MONGO_URI_PLACEHOLDER|mongodb://flaskapp:${ENCODED_PASS}@10.3.0.10:27017/flaskdb|g" k8s/secret.yaml

          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/rbac.yaml
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/networkpolicy.yaml

          # Install Kyverno (idempotent — skips if already installed)
          # helm repo add kyverno https://kyverno.github.io/kyverno/ --force-update
          # Wait for Kyverno admission controller to be ready before applying policies
          # helm upgrade --install kyverno kyverno/kyverno -n kyverno --create-namespace --wait --timeout 120s

          # Apply Cosign signature verification policy
          kubectl apply -f k8s/kyverno-policy.yaml

          # Deploy application (Kyverno validates the image signature)
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml

          # Wait for rollout to complete
          kubectl rollout status deployment/flask-app-deploy -n web-app --timeout=300s

          # For triggering the Workflow
