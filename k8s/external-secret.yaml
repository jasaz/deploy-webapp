# Create the k8s secret flask-app-secret with External Secrets Operator pulling from GCP Secret Manager
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: flask-app-external-secret
  namespace: web-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: ClusterSecretStore
  target:
    name: flask-app-secret
  data:
    - secretKey: MONGO_PASS
      remoteRef:
        key: mongo_app_pass
