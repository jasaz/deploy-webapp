apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app-deploy
  namespace: web-app
  labels:
    app: flask-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault # Docker's default seccomp profile
      serviceAccountName: flask-app-sa
      containers:
        - name: flask-app
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 5000
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: flask-app-secret
                  key: MONGO_URI
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            runAsUser: 65532 # nonroot user in base image
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
