# PROJECT_ID_PLACEHOLDER should be replaced with the actual GCP project ID, which can be done via sed in the GitHub Actions workflow before applying the manifest. This ClusterSecretStore configures the External Secrets Operator to connect to GCP Secret Manager and fetch secrets for use in Kubernetes.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: gcp-secret-store
spec:
  provider:
    gcpsm:
      projectID: PROJECT_ID_PLACEHOLDER
