# Applies only to namespace web-app
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-cosign-signature
spec:
  # Enforce = block unsigned images | Audit = log only
  validationFailureAction: Enforce
  background: false
  webhookTimeoutSeconds: 30
  rules:
    - name: verify-image-signature
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - web-app
      verifyImages:
        - imageReferences:
            - "australia-southeast1-docker.pkg.dev/*/wiz-gar-repo/*"
          attestors:
            - entries:
                - keyless:
                    issuer: "https://token.actions.githubusercontent.com"
                    subject: "https://github.com/jasaz/deploy-webapp/*"
                    rekor:
                      url: "https://rekor.sigstore.dev"
