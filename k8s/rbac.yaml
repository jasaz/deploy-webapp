apiVersion: v1
kind: ServiceAccount
metadata:
  name: flask-app-sa
  namespace: web-app
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: flask-app-cluster-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: flask-app-sa
    namespace: web-app
